schema = 1
project = "canopus-kernel"
default = "kernel"

[targets.kernel]
kind = "exe"
package = "kernel"
root = "src/main.mc"
mode = "debug"
env = "freestanding"
target = "arm64-apple-darwin25.4.0"

[targets.kernel.search_paths]
modules = ["src", "../stdlib"]

[targets.kernel.module_sets.capability]
files = [
	"src/capability/00_types.mc",
	"src/capability/01_lookup.mc",
	"src/capability/02_ops.mc",
	"src/capability/03_validation.mc",
]

[targets.kernel.module_sets.ipc]
files = [
	"src/ipc/00_types.mc",
	"src/ipc/01_queue.mc",
	"src/ipc/02_runtime.mc",
	"src/ipc/03_failure.mc",
	"src/ipc/04_validation.mc",
]

[targets.kernel.module_sets.debug]
files = [
	"src/debug/00_types.mc",
	"src/debug/01_phase108_117.mc",
	"src/debug/02_phase118_123.mc",
	"src/debug/03_phase124_126.mc",
	"src/debug/04_phase128_130.mc",
	"src/debug/05_phase131.mc",
	"src/debug/06_phase132.mc",
	"src/debug/07_phase133.mc",
	"src/debug/08_phase134.mc",
	"src/debug/09_phase135.mc",
	"src/debug/10_phase136.mc",
	"src/debug/11_phase137.mc",
	"src/debug/12_phase140.mc",
	"src/debug/13_phase141.mc",
	"src/debug/14_phase142.mc",
	"src/debug/15_phase143.mc",
	"src/debug/16_phase144.mc",
	"src/debug/17_phase145.mc",
]

[targets.kernel.module_sets.bootstrap_audit]
files = [
	"src/bootstrap_audit/00_types.mc",
	"src/bootstrap_audit/01_phase104_105.mc",
	"src/bootstrap_audit/02_phase106_107.mc",
	"src/bootstrap_audit/03_builders.mc",
]

[targets.kernel.module_sets.bootstrap_services]
files = [
	"src/bootstrap_services/00_types.mc",
	"src/bootstrap_services/01_log.mc",
	"src/bootstrap_services/02_echo.mc",
	"src/bootstrap_services/03_transfer.mc",
	"src/bootstrap_services/04_composition.mc",
	"src/bootstrap_services/05_serial.mc",
	"src/bootstrap_services/06_shell.mc",
	"src/bootstrap_services/07_kv.mc",
	"src/bootstrap_services/08_phase145.mc",
]

[targets.kernel.runtime]
startup = "bootstrap_main"
