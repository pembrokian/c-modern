schema = 1
project = "kernel-reset-lane"
default = "kernel"

[targets.kernel]
kind = "exe"
package = "kernel"
root = "src/main.mc"
mode = "debug"
env = "hosted"

[targets.kernel.search_paths]
modules = [
	"src",
	"src/boot",
	"src/identity",
	"src/services",
	"src/shell",
	"src/scenarios",
	"src/transport",
	"../examples/real/issue_rollup/src/app",
	"../examples/real/issue_rollup/src/parse",
	"../examples/real/issue_rollup/src/model",
	"../examples/real/issue_rollup/src/render",
	"../examples/real/review_board/src",
	"../stdlib"
]

[targets.kernel.module_sets.boot]
files = [
	"src/boot/boot.mc",
	"src/boot/boot_update.mc",
	"src/boot/boot_identity.mc"
]

[targets.kernel.runtime]
startup = "default"