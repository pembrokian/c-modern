schema = 1
project = "kernel-reset-lane-delivery-witness"
default = "app"

[targets.app]
kind = "exe"
package = "app"
root = "src/main.mc"
mode = "debug"
env = "hosted"

[targets.app.search_paths]
modules = ["src", "__KERNEL_NEW_SRC__"]

[targets.app.module_sets.boot]
files = [
	"__KERNEL_NEW_SRC__/boot.mc",
	"__KERNEL_NEW_SRC__/boot_update.mc",
	"__KERNEL_NEW_SRC__/boot_identity.mc"
]

[targets.app.runtime]
startup = "default"
