schema = 1
project = "kernel-reset-lane-phase208-retained-policy"
default = "app"

[targets.app]
kind = "exe"
package = "app"
root = "src/main.mc"
mode = "debug"
env = "hosted"

[targets.app.search_paths]
modules = ["src", "__KERNEL_NEW_SRC__", "__KERNEL_NEW_SRC__/boot", "__KERNEL_NEW_SRC__/identity", "__KERNEL_NEW_SRC__/services", "__KERNEL_NEW_SRC__/shell", "__KERNEL_NEW_SRC__/scenarios", "__KERNEL_NEW_SRC__/transport"]

[targets.app.module_sets.boot]
files = [
	"__KERNEL_NEW_SRC__/boot/boot.mc",
	"__KERNEL_NEW_SRC__/boot/boot_update.mc",
	"__KERNEL_NEW_SRC__/boot/boot_identity.mc"
]

[targets.app.runtime]
startup = "default"
