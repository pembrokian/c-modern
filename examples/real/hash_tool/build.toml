schema = 1
project = "hash-tool"
default = "hash"

[targets.hash]
kind = "exe"
root = "src/main.mc"
mode = "debug"
env = "hosted"

[targets.hash.search_paths]
modules = ["src", "../../../stdlib"]

[targets.hash.runtime]
startup = "default"

[targets.hash.tests]
enabled = true
roots = ["tests"]
mode = "checked"
timeout_ms = 5000