schema = 1
project = "evented-partial-write"
default = "partial-write"

[targets.partial-write]
kind = "exe"
package = "evented-partial-write"
root = "src/main.mc"
mode = "debug"
env = "hosted"

[targets.partial-write.search_paths]
modules = ["src", "../evented_echo/src", "../../../stdlib"]

[targets.partial-write.runtime]
startup = "default"

[targets.partial-write.tests]
enabled = true
roots = ["tests"]
mode = "checked"
timeout_ms = 5000